<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Find Your Group</title><style>body{font-family:Segoe UI,Arial,sans-serif;background:#f4f6f8;max-width:900px;margin:40px auto;padding:20px}.card{background:white;padding:30px;border-radius:14px;box-shadow:0 2px 10px rgba(0,0,0,.08)}input{width:100%;padding:14px;font-size:17px}button{margin-top:10px;padding:12px 20px;background:#0078d4;color:#fff;border:none;border-radius:8px} .match{border-left:4px solid #0078d4;padding-left:12px;margin:18px 0}</style></head><body><div class="card"><h1>🎉 Find Your Group</h1><p>Enter part of your name</p><p><b>Examples:</b> Josh, Chris, Mila</p><input id="search" placeholder="Type your name and press Enter"><button onclick="findGroup()">Search</button><div id="result"></div></div><script>const data=[{group:1,name:'Dan Simpelo'},{group:1,name:'Amanda Rearick'},{group:1,name:'Joshua Jones'},{group:1,name:'Samantha Ferraro'},{group:1,name:'Nicholas Weicker'},{group:1,name:'Claudia Zheng'},{group:2,name:'Moeed Faisal'},{group:2,name:'Zoe Wright'},{group:2,name:'James Lothian'},{group:2,name:'Mitch Merberg'},{group:2,name:'Alejandro Monsech'},{group:2,name:'Ian Wong'},{group:3,name:'Joshua Friend'},{group:3,name:'Mark Baxter'},{group:3,name:'Cameron Vogt'},{group:3,name:'Max Chiao'},{group:3,name:'Dom Yarnell'},{group:3,name:'Mila Ho'},{group:4,name:'Cole Meixner'},{group:4,name:'Michael Feoli'},{group:4,name:'Tyler Brey'},{group:4,name:'Carol Lam'},{group:4,name:'Terre Goh'},{group:4,name:'Cherie Dill'},{group:5,name:'Xiaomin Wang'},{group:5,name:'Atiya Furqan'},{group:5,name:'Peter Vita'},{group:5,name:'Lydia Li'},{group:5,name:'Andres Rosero'},{group:6,name:'John Filippini'},{group:6,name:'Andrew Switzer'},{group:6,name:'Serena (Sena) Lee'},{group:6,name:'Kashaf Noor'},{group:6,name:'Avraham Akerman'},{group:6,name:'Alfred Miu'},{group:7,name:'Roland Bongioanni'},{group:7,name:'Danny Makrides'},{group:7,name:'Leonardo Cavicchio'},{group:7,name:'Jacob Edwards'},{group:7,name:'Jordan Golaszewski'},{group:7,name:'Chris Flach'},{group:8,name:'Andrew Hancock'},{group:8,name:'Paul R Roth'},{group:8,name:'Dovy Goldberg'},{group:8,name:'Zamira Laverde'},{group:8,name:'Alejandro Monsech'},{group:9,name:'Shota Okajima'},{group:9,name:'Samantha Cicerone'},{group:9,name:'Jaime Mejia-Santos'},{group:9,name:'Jimmy Tan'},{group:9,name:'Carlos Gratereaux'}];function findGroup(){const q=document.getElementById('search').value.toLowerCase().trim();const r=document.getElementById('result');if(!q){r.innerHTML='';return;}const matches=data.filter(x=>x.name.toLowerCase().includes(q));if(matches.length===0){r.innerHTML='<p>❌ No match found</p>';return;}r.innerHTML=matches.map(m=>{const members=data.filter(d=>d.group===m.group).map(d=>'<li>'+d.name+'</li>').join('');return `<div class="match"><h3>✅ ${m.name}</h3><p><b>Group ${m.group}</b></p><p>Your group members:</p><ul>${members}</ul></div>`;}).join('');}document.getElementById('search').addEventListener('keypress',e=>{if(e.key==='Enter')findGroup();});</script></body></html>
